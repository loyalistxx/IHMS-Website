<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IHMS - بوابة المريض</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/stylesheet.css">
</head>
<body class="portalBody">
    <div class="header-patient mb-4 text-center">
        <h5 class="mb-1">مرحباً بك،</h5>
        <h3 class="fw-bold">أحمد محمد</h3>
        <p class="small opacity-75">رقم الملف الطبي: #99201</p>
    </div>

    <div class="container">
        <div class="appointment-alert p-3 mb-4 d-flex align-items-center">
            <div class="flex-grow-1">
                <span class="d-block small text-muted">موعدك القادم:</span>
                <span class="fw-bold">الأحد، 15 مارس - 10:30 صباحاً</span>
            </div>
            <span class="badge bg-primary rounded-pill">قريباً</span>
        </div>

        <div class="row g-3">
            <div class="col-6">
                <div class="action-card shadow-sm">
                    <span class="icon-box">📅</span>
                    <h6>حجز موعد</h6>
                </div>
            </div>
            <div class="col-6">
                <div class="action-card shadow-sm">
                    <span class="icon-box">🧪</span>
                    <h6>نتائج التحاليل</h6>
                </div>
            </div>
            <div class="col-6">
                <div class="action-card shadow-sm">
                    <span class="icon-box">💊</span>
                    <h6>الأدوية</h6>
                </div>
            </div>
            <div class="col-6">
                <div class="action-card shadow-sm">
                    <span class="icon-box">📄</span>
                    <h6>تقاريري</h6>
                </div>
            </div>
        </div>

        <h5 class="mt-4 mb-3">النشاط الأخير</h5>
        <div class="list-group shadow-sm rounded-15">
            <div class="list-group-item">
                <div class="d-flex w-100 justify-content-between">
                    <h6 class="mb-1">زيارة عيادة القلب</h6>
                    <small class="text-muted">منذ يومين</small>
                </div>
                <p class="mb-1 small">تم اعتماد التقرير الطبي بواسطة د. محمود شاكر</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav shadow">
        <a href="#" class="nav-item active">
            <div>🏠</div>
            <div>الرئيسية</div>
        </a>
        <a href="#" class="nav-item">
            <div>📅</div>
            <div>مواعيدي</div>
        </a>
        <a href="#" class="nav-item">
            <div>🔔</div>
            <div>التنبيهات</div>
        </a>
        <a href="#" class="nav-item">
            <div>👤</div>
            <div>حسابي</div>
        </a>
    </div>
